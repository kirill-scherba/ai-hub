# 🐪 AI Hub — Docker Compose
# Run both Hub Server (Go) and Perl MCP Hub together

services:
  hub-server:
    build:
      context: ./hub-server
      dockerfile: Dockerfile
    ports:
      - "8484:8484"
    environment:
      AI_HUB_PORT: "8484"
      AI_HUB_DATA_DIR: /data
    volumes:
      - hub-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8484/tools"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  perl-hub:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      hub-server:
        condition: service_healthy
    environment:
      AI_HUB_SERVER_URL: "http://hub-server:8484"
    stdin_open: true
    tty: true
    restart: unless-stopped

volumes:
  hub-data: