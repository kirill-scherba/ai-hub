name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        perl-version: ['5.36', '5.38', '5.40']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Perl
      uses: shogo82148/actions-setup-perl@v1
      with:
        perl-version: ${{ matrix.perl-version }}

    - name: Show Perl version
      run: perl -v

    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq curl
        cpanm --quiet --notest JSON

    - name: Run sandbox tests
      run: perl t/01-sandbox.t
      env:
        AI_HUB_SKIP_HUB: 1

    - name: Run tool generation tests
      run: perl t/01-toolgen.t
      env:
        AI_HUB_SKIP_HUB: 1

    - name: Run hub interaction tests (no Hub)
      run: perl t/02-hub.t
      env:
        AI_HUB_SKIP_HUB: 1

  test-go-hub:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
        check-latest: true

    - name: Build Go Hub Server
      run: go build -o hub-server ./hub-server/

    - name: Check binary exists
      run: test -f hub-server && echo "Build successful"